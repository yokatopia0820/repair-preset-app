<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>修理報告プリセット支援ツール</title>
<style>
:root{
  --red:#ef0018;
  --red-dark:#c90015;
  --pink:#f7a1b2;
  --pink-soft:#fff1f4;
  --ink:#242424;
  --muted:#6d6d6d;
  --line:#d8d8d8;
  --field:#f1f1f3;
  --panel:#ffffff;
  --bg:#f6f7f9;
  --black:#151515;
  --blue:#1769e0;
  --orange:#f08a1f;
  --green:#178a52;
  --shadow:0 18px 50px rgba(24,24,24,.16);
}
*{box-sizing:border-box}
html{height:100%}
body{
  min-height:100%;
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
  letter-spacing:0;
}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.app-shell{min-height:100vh;padding-bottom:76px}
.topbar{
  position:sticky;
  top:0;
  z-index:30;
  background:var(--red);
  color:#fff;
  box-shadow:0 2px 0 rgba(0,0,0,.08);
}
.hero{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px 14px;
  position:relative;
}
.title-wrap{display:flex;align-items:center;justify-content:center;min-width:0}
.back,.subtitle,.hero-actions{display:none}
h1{margin:0;font-size:18px;font-weight:900;white-space:nowrap}
.version-badge{
  display:inline-flex;
  align-items:center;
  margin-left:8px;
  padding:2px 7px;
  border-radius:999px;
  background:rgba(255,255,255,.2);
  color:#fff;
  font-size:11px;
  font-weight:900;
  vertical-align:middle;
}
.theme-toggle{
  position:absolute;
  left:8px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  align-items:center;
  gap:6px;
  color:#fff;
  font-size:12px;
  font-weight:900;
}
.theme-toggle .switch{width:46px;height:26px}
.theme-toggle .slider:before{width:20px;height:20px}
.theme-toggle .switch input:checked + .slider:before{transform:translateX(20px)}
.settings-btn{
  position:absolute;
  right:8px;
  top:50%;
  width:36px;
  height:36px;
  transform:translateY(-50%);
  border:0;
  border-radius:50%;
  background:rgba(255,255,255,.18);
  color:#fff;
  font-size:20px;
  font-weight:900;
  line-height:1;
}
.settings-btn:hover{background:rgba(255,255,255,.26)}
.pill{
  border:0;
  border-radius:999px;
  padding:9px 14px;
  background:var(--black);
  color:#fff;
  font-weight:800;
  font-size:13px;
  min-height:38px;
}
.pill.red{background:#fff;color:var(--red)}
.casebar{
  max-width:1180px;
  margin:0 auto;
  padding:10px 18px;
  display:flex;
  justify-content:flex-end;
  gap:10px;
  align-items:center;
  background:#fff;
  border-bottom:1px solid var(--line);
}
.manager{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.mode-control{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  font-size:13px;
  font-weight:900;
}
.switch{
  position:relative;
  display:inline-flex;
  width:52px;
  height:30px;
  flex:0 0 auto;
}
.switch input{position:absolute;opacity:0;pointer-events:none}
.slider{
  position:absolute;
  inset:0;
  border-radius:999px;
  background:#cfd3da;
  transition:background .18s;
}
.slider:before{
  content:"";
  position:absolute;
  left:3px;
  top:3px;
  width:24px;
  height:24px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 2px 5px rgba(0,0,0,.22);
  transition:transform .18s;
}
.switch input:checked + .slider{background:var(--red)}
.switch input:checked + .slider:before{transform:translateX(22px)}
.action{
  border:0;
  border-radius:8px;
  min-height:42px;
  padding:10px 14px;
  background:#333;
  color:#fff;
  font-weight:800;
  font-size:13px;
}
.action.primary{background:var(--red)}
.action.light{background:#f0f1f3;color:#222}
.action.warn{background:#fff4e6;color:#9b4c00;border:1px solid #ffd6a3}
.action.danger{background:#fff0f2;color:var(--red-dark);border:1px solid #ffc4cc}
.invoice-strip{
  max-width:1180px;
  margin:0 auto;
  padding:20px 18px 28px;
  display:flex;
  gap:14px;
  background:#fff;
  overflow:auto;
}
.invoice-card{
  position:relative;
  min-width:150px;
  padding:10px 12px;
  border:5px solid #ffd0db;
  background:#fff;
  text-align:center;
  font-weight:800;
}
.invoice-card span{display:block;color:var(--red);font-size:13px;margin-bottom:7px}
.invoice-card select{
  width:100%;
  min-height:38px;
  padding:7px 28px 7px 10px;
  border-radius:6px;
  font-weight:900;
  text-align:center;
  text-align-last:center;
}
.invoice-card option{text-align:center}
.invoice-type-label{
  width:100%;
  min-height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:6px;
  background:#f7f7f8;
  font-weight:900;
  text-align:center;
}
.multi-reason{
  display:grid;
  gap:6px;
  margin-top:10px;
  color:var(--muted);
  font-size:11px;
  font-weight:900;
}
.multi-reason span{
  margin:0;
  color:var(--muted);
  font-size:11px;
}
.invoice-reason-label{
  display:grid;
  gap:4px;
  margin-top:8px;
  padding:8px;
  border-radius:6px;
  background:#fff1f4;
  color:#333;
  font-size:12px;
  line-height:1.35;
  text-align:center;
}
.invoice-reason-label small{
  color:var(--red);
  font-weight:900;
}
.invoice-delete{
  width:100%;
  margin-top:10px;
  border:1px solid #ffc4cc;
  border-radius:6px;
  min-height:34px;
  background:#fff0f2;
  color:var(--red-dark);
  font-weight:900;
}
.invoice-delete:hover{background:#ffe3e8}
.invoice-card.active:after{
  content:"";
  position:absolute;
  left:50%;
  bottom:-22px;
  width:28px;
  height:28px;
  transform:translateX(-50%) rotate(45deg);
  border-right:5px solid #ffd0db;
  border-bottom:5px solid #ffd0db;
  background:#fff;
}
.invoice-add{
  min-width:170px;
  border:5px solid #eee;
  background:#fff;
  color:#aaa;
  padding:10px;
}
.invoice-add select{
  width:100%;
  min-height:40px;
  border:0;
  background:#fff;
  color:#777;
  font-weight:900;
}
.tabs{
  position:sticky;
  top:42px;
  z-index:20;
  max-width:1180px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(5,minmax(0,1fr));
  gap:4px;
  background:#fff;
  border-bottom:4px solid var(--red);
  overflow:hidden;
}
.tab{
  border:0;
  border-radius:8px 8px 0 0;
  background:#ef91a5;
  color:#fff;
  min-height:52px;
  padding:10px 6px;
  font-weight:900;
  line-height:1.2;
  white-space:normal;
  word-break:keep-all;
}
.tab.active{background:var(--red)}
.workspace{
  max-width:1180px;
  margin:0 auto;
  background:#fff;
  border-left:5px solid #ffd2dc;
  border-right:5px solid #ffd2dc;
}
.tab-panel{display:none;padding:22px 40px 36px}
.tab-panel.active{display:block}
.display-panel{display:none;max-width:1180px;margin:0 auto;background:#fff;padding:18px;border-left:5px solid #ffd2dc;border-right:5px solid #ffd2dc}
.display-panel.active{display:block}
.copy-grid{display:grid;gap:16px}
.copy-invoice{
  display:grid;
  gap:14px;
  border:1px solid #ffd2dc;
  border-radius:10px;
  padding:14px;
  background:#fff;
}
.copy-invoice-title{
  margin:0;
  color:#222;
  font-size:18px;
  font-weight:900;
}
.copy-invoice-reason{
  margin-top:-6px;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}
.copy-section{
  display:grid;
  gap:8px;
}
.copy-section h2{
  margin:0;
  padding:0 2px 4px;
  color:var(--red);
  font-size:16px;
  font-weight:900;
  border-bottom:2px solid #ffd2dc;
}
.copy-section-items{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
.copy-card{
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  color:#222;
  padding:12px;
  text-align:left;
  min-height:64px;
  transition:background .15s,border-color .15s,box-shadow .15s,transform .15s;
}
.copy-card:hover{
  background:#fff1f4;
  border-color:#ff9aae;
  box-shadow:0 8px 18px rgba(239,0,24,.12);
  transform:translateY(-1px);
}
.copy-card strong{display:block;color:var(--red);font-size:12px;margin-bottom:5px}
.copy-card span{display:block;line-height:1.45;word-break:break-word}
.copy-empty{padding:22px;text-align:center;color:var(--muted);font-weight:800;border:1px dashed #ccc;border-radius:8px}
body.view-mode .workspace{display:none}
body.view-mode .display-panel{display:block}
body.view-mode .edit-only{display:none!important}
.section-title{
  margin:0 0 18px;
  color:var(--red);
  font-size:16px;
  font-weight:900;
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 26px}
.field-row{
  display:grid;
  grid-template-columns:190px minmax(0,1fr);
  gap:12px;
  align-items:center;
  min-height:62px;
  border-bottom:1px solid var(--line);
  padding:8px 0;
}
.field-row.full{grid-column:1/-1}
.field-row.wide-label{grid-template-columns:250px minmax(0,1fr)}
.field-row.no-line{border-bottom:0}
label{
  color:var(--muted);
  font-weight:800;
  line-height:1.35;
}
.required:after{content:" *";color:var(--red)}
input,select,textarea{
  width:100%;
  border:0;
  border-radius:8px;
  background:var(--field);
  color:#1f1f1f;
  min-height:46px;
  padding:10px 14px;
  outline:2px solid transparent;
  transition:outline-color .15s,background .15s,box-shadow .15s;
}
textarea{min-height:110px;resize:vertical;line-height:1.55}
input:focus,select:focus,textarea:focus{
  background:#fff;
  outline-color:#ffb6c2;
  box-shadow:0 0 0 4px rgba(239,0,24,.08);
}
.mini-grid{display:grid;grid-template-columns:1fr;gap:10px}
.inline-code-grid{
  display:grid;
  grid-template-columns:minmax(90px,120px) minmax(0,1fr);
  gap:10px;
}
.short-code{
  max-width:120px;
  text-align:left;
}
.pill:hover,.action:hover{filter:brightness(.96)}
.hidden-field{display:none!important}
.table-wrap{overflow:auto;border:1px solid var(--line);background:#fff}
table{width:100%;border-collapse:collapse;min-width:520px}
.bill-table{min-width:0}
.bill-table th:first-child,.bill-table td:first-child{width:42%}
.bill-table th:last-child,.bill-table td:last-child{width:58%}
th{background:#9b9b9b;color:#fff;text-align:center;padding:14px;font-weight:900}
td{border:1px solid var(--line);padding:10px 12px;vertical-align:middle}
td:first-child{font-weight:900}
td.number{text-align:right}
.money-input{text-align:right}
.parts-empty{
  height:210px;
  display:grid;
  place-items:center;
  color:#aaa;
  border:1px solid var(--line);
  border-top:0;
  font-weight:800;
}
.parts-actions{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:16px;
  margin:22px 0;
}
.parts-actions h2{margin:0;text-align:center;font-size:18px}
.part-delete{
  border:1px solid #ffc4cc;
  border-radius:6px;
  min-height:36px;
  padding:7px 10px;
  background:#fff0f2;
  color:var(--red-dark);
  font-weight:900;
  white-space:nowrap;
}
.part-delete:hover{background:#ffe3e8}
.bottom-bar{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:35;
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:70px;
  box-shadow:0 -2px 12px rgba(0,0,0,.08);
}
.bottom-bar button{
  border:0;
  color:#fff;
  font-weight:800;
  font-size:16px;
}
.bottom-bar .draft{background:#3b3b3b}
.bottom-bar .send{background:#cfcfcf;color:#fff}
body.dark-mode{
  --ink:#f3f4f6;
  --muted:#aab2c0;
  --line:#333b48;
  --field:#252c36;
  --panel:#171c24;
  --bg:#0f131a;
  --black:#f3f4f6;
  --shadow:0 18px 50px rgba(0,0,0,.38);
}
body.dark-mode .topbar{
  background:#111722;
  border-bottom:3px solid var(--red);
  box-shadow:0 8px 24px rgba(0,0,0,.35);
}
body.dark-mode .hero{background:#111722}
body.dark-mode .version-badge{background:rgba(239,0,24,.28)}
body.dark-mode .settings-btn,
body.dark-mode .theme-toggle .slider{
  background:#29313d;
  color:#fff;
}
body.dark-mode .settings-btn:hover{background:#35404f}
body.dark-mode .casebar,
body.dark-mode .invoice-strip,
body.dark-mode .workspace,
body.dark-mode .display-panel,
body.dark-mode .modal,
body.dark-mode .confirm,
body.dark-mode .preset-item,
body.dark-mode .copy-invoice,
body.dark-mode .copy-card,
body.dark-mode .table-wrap,
body.dark-mode .sync-panel,
body.dark-mode .setting-check,
body.dark-mode .invoice-card,
body.dark-mode .invoice-add{
  background:var(--panel);
  color:var(--ink);
}
body.dark-mode .casebar{border-bottom-color:var(--line)}
body.dark-mode .invoice-strip{
  background:#151a22;
  border-bottom:1px solid var(--line);
}
body.dark-mode .invoice-card{
  border-color:#5a3440;
  background:#171c24;
}
body.dark-mode .invoice-card.active:after{
  border-right-color:#5a3440;
  border-bottom-color:#5a3440;
  background:#171c24;
}
body.dark-mode .invoice-add{border-color:#394251}
body.dark-mode .tabs{
  background:#121720;
  border-bottom-color:var(--red);
}
body.dark-mode .tab{
  background:#313947;
  color:#dce3ee;
}
body.dark-mode .tab.active{
  background:var(--red);
  color:#fff;
}
body.dark-mode input,
body.dark-mode select,
body.dark-mode textarea,
body.dark-mode .invoice-type-label{
  background:var(--field);
  color:var(--ink);
}
body.dark-mode input::placeholder,
body.dark-mode textarea::placeholder{color:#737d8c}
body.dark-mode input:focus,
body.dark-mode select:focus,
body.dark-mode textarea:focus{
  background:#202733;
  outline-color:#ff7d91;
  box-shadow:0 0 0 4px rgba(239,0,24,.16);
}
body.dark-mode th{
  background:#3a4351;
  color:#f5f7fb;
}
body.dark-mode td,
body.dark-mode .copy-card,
body.dark-mode .setting-check,
body.dark-mode .preset-item{border-color:var(--line)}
body.dark-mode td:first-child,
body.dark-mode label,
body.dark-mode .preset-meta,
body.dark-mode .modal-head p{color:var(--muted)}
body.dark-mode .action.light{background:#303641;color:var(--ink)}
body.dark-mode .action.danger{background:#3a2026;color:#ffb8c3;border-color:#6d303d}
body.dark-mode .mode-control{background:#171c24;border-color:var(--line);color:var(--ink)}
body.dark-mode .section-title,
body.dark-mode .copy-section h2{color:#ff4b62}
body.dark-mode .copy-card:hover{background:#2a2025}
body.dark-mode .parts-empty,
body.dark-mode .empty{background:#151a22;border-color:var(--line);color:var(--muted)}
body.dark-mode .bottom-bar .draft{background:#151a22}
body.dark-mode .bottom-bar .send{background:#565b64}
.overlay{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,.48);
  z-index:70;
}
.modal{
  position:fixed;
  left:50%;
  top:50%;
  width:min(880px,94vw);
  max-height:88vh;
  display:none;
  transform:translate(-50%,-50%);
  z-index:80;
  background:#fff;
  border-radius:14px;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.modal-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  padding:20px 22px;
  border-bottom:1px solid var(--line);
}
.modal-head h2{margin:0;font-size:20px}
.modal-head p{margin:5px 0 0;color:var(--muted);font-size:13px}
.modal-body{padding:18px 22px 22px;overflow:auto;max-height:calc(88vh - 84px)}
.preset-tools{
  display:grid;
  grid-template-columns:1.2fr auto auto;
  gap:10px;
  margin-bottom:14px;
}
.preset-tools.simple-tools{grid-template-columns:1fr auto}
.backup-row,.search-row{
  display:grid;
  grid-template-columns:1fr auto auto;
  gap:10px;
  margin-bottom:16px;
}
.sync-panel{
  border:1px solid #dbe2ea;
  background:#f8fafc;
  border-radius:12px;
  padding:14px;
  margin:0 0 16px;
}
.sync-panel h3{margin:0 0 6px;font-size:15px}
.sync-panel p{margin:0 0 12px;color:var(--muted);font-size:12px;line-height:1.55}
.sync-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.sync-grid textarea{grid-column:1/-1;min-height:86px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px}
.sync-actions{display:flex;gap:10px;flex-wrap:wrap}
.sync-state{font-size:12px;color:var(--muted);font-weight:800;margin-top:10px}
.settings-list{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}
.setting-check{
  display:flex;
  align-items:center;
  gap:10px;
  min-height:44px;
  padding:10px 12px;
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  font-weight:800;
  color:#333;
}
.setting-check input{
  width:20px;
  min-height:20px;
  flex:0 0 auto;
  accent-color:var(--red);
}
.setting-check span{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  border-radius:999px;
  padding:7px 11px;
  font-size:12px;
  font-weight:800;
  margin-bottom:14px;
}
.badge.ok{background:#e8f6ef;color:#126f42;border:1px solid #b7e3cb}
.badge.ng{background:#fff3e2;color:#a35b00;border:1px solid #ffd3a0}
.preset-list{display:grid;gap:10px}
.preset-item{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto auto auto;
  gap:8px;
  align-items:center;
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px;
  background:#fbfbfc;
}
.preset-name{font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preset-meta{font-size:12px;color:var(--muted);margin-top:3px}
.empty{
  text-align:center;
  color:#9b9b9b;
  padding:34px 10px;
  border:1px dashed #ccc;
  border-radius:10px;
}
.toast{
  position:fixed;
  left:50%;
  bottom:88px;
  transform:translateX(-50%) translateY(10px);
  z-index:100;
  background:#181818;
  color:#fff;
  border-radius:9px;
  padding:12px 18px;
  font-size:13px;
  opacity:0;
  pointer-events:none;
  transition:opacity .18s,transform .18s;
  box-shadow:0 8px 24px rgba(0,0,0,.22);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confirm{
  position:fixed;
  left:50%;
  top:50%;
  width:min(360px,88vw);
  display:none;
  transform:translate(-50%,-50%);
  z-index:120;
  background:#fff;
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:22px;
  text-align:center;
}
.confirm p{margin:0 0 18px;line-height:1.65;font-weight:800}
.confirm-actions{display:flex;gap:10px}
.confirm-actions button{flex:1}
@media (max-width:860px){
  .casebar{display:block}
  .manager{justify-content:stretch}
  .manager .action{flex:1}
  .tabs{top:42px}

<script>
(function(){
  var STORAGE_KEY = "repair_report_presets_v1";
  var DRAFT_KEY = "repair_report_draft_v1";
  var MODE_KEY = "repair_report_mode_v1";
  var DARK_MODE_KEY = "repair_report_dark_mode_v1";
  var FIELD_VISIBILITY_KEY = "repair_report_field_visibility_v1";
  var CLOUD_CONFIG_KEY = "repair_report_cloud_config_v1";
  var CLOUD_SYNC_ID_KEY = "repair_report_cloud_sync_id_v1";
  var CLOUD_PIN_KEY = "repair_report_cloud_pin_v1";
  var storageOK = false;
  var memPresets = [];
  var dirty = false;
  var toastTimer = null;
  var currentTab = "main";
  var BILLING_TYPES = ["無償","依頼元請求","現金売掛","自家負担","請求先指定","SA直収","QR決済","請求委託（請求書発行）"];
  var MULTI_REASON_TYPES = [
    "販売店",
    "長期保証制度による顧客との費用案分",
    "サービスコール処置など無償請求案分",
    "値引きのため",
    "依頼元指示による複数請求",
    "SC指示による複数請求",
    "顧客購入部品持参",
    "その他（理由明記のこと）"
  ];
  var cloud = { app: null, db: null, ready: false, modules: null };
  var billRows = [
    "技術料1","技術料2","技術料3","技術料4","部品代","出張料1","出張料2","その他1","その他2","値引き"
  ];
  var invoices = [{ type: "無償", reason: "", data: {} }];
  var currentInvoiceIndex = 0;
  var partRows = [];

  try{
    localStorage.setItem("__repair_test__","1");
    localStorage.removeItem("__repair_test__");
    storageOK = true;
  }catch(e){ storageOK = false; }

  function $(id){ return document.getElementById(id); }
  function all(selector, root){ return Array.prototype.slice.call((root || document).querySelectorAll(selector)); }
  function fieldEls(){ return all("[data-label]"); }
  function loadFieldVisibility(){
    if(!storageOK) return {};
    try{
      var raw = localStorage.getItem(FIELD_VISIBILITY_KEY);
      var parsed = raw ? JSON.parse(raw) : {};
      return parsed && typeof parsed === "object" ? parsed : {};
    }catch(e){ return {}; }
  }
  function saveFieldVisibility(map){
    if(storageOK) localStorage.setItem(FIELD_VISIBILITY_KEY, JSON.stringify(map));
  }
  function isFieldVisible(el){
    var map = loadFieldVisibility();
    return map[el.id] !== false;
  }
  function fieldMeta(){
    var seen = {};
    return fieldEls().filter(function(el){
      if(!el.id || seen[el.id]) return false;
      seen[el.id] = true;
      return true;
    }).map(function(el){
      return { id: el.id, label: el.getAttribute("data-label") || el.id };
    });
  }
  function applyFieldVisibility(){
    var map = loadFieldVisibility();
    fieldEls().forEach(function(el){
      var hidden = map[el.id] === false;
      el.classList.toggle("hidden-field", hidden);
      el.disabled = hidden;
    });
    all(".field-row").forEach(function(row){
      var fields = fieldEls().filter(function(el){ return row.contains(el); });
      row.classList.toggle("hidden-field", fields.length > 0 && fields.every(function(el){ return map[el.id] === false; }));
    });
    all("#billBody tr").forEach(function(row){
      var fields = fieldEls().filter(function(el){ return row.contains(el); });
      row.classList.toggle("hidden-field", fields.length > 0 && fields.every(function(el){ return map[el.id] === false; }));
    });
    renderDisplayMode();
  }
  function renderFieldSettings(){
    var list = $("fieldSettingsList");
    if(!list) return;
    var map = loadFieldVisibility();
    list.innerHTML = "";
    fieldMeta().forEach(function(meta){
      var label = document.createElement("label");
      label.className = "setting-check";
      var input = document.createElement("input");
      input.type = "checkbox";
      input.checked = map[meta.id] !== false;
      input.addEventListener("change", function(){
        map[meta.id] = input.checked;
        saveFieldVisibility(map);
        applyFieldVisibility();
      });
      var span = document.createElement("span");
      span.textContent = meta.label;
      label.appendChild(input);
      label.appendChild(span);
      list.appendChild(label);
    });
  }
  function nowText(){
    var d = new Date();
    var pad = function(n){ return String(n).padStart(2,"0"); };
    return d.getFullYear()+"/"+pad(d.getMonth()+1)+"/"+pad(d.getDate())+" "+pad(d.getHours())+":"+pad(d.getMinutes());
  }
  function toast(msg){
    var t = $("toast");
    t.textContent = msg;
    t.classList.add("show");

  async function ensureCloud(){
    var settings = loadCloudSettings();
    if(!settings.configText || !settings.syncId){
      throw new Error("同期設定が未入力です");
    }
    if(cloud.ready) return settings;
    var config;
    try{
      config = JSON.parse(settings.configText);
    }catch(e){
      throw new Error("Firebase設定JSONの形式が正しくありません");
    }
    var appMod = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js");
    var firestoreMod = await import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js");
    cloud.modules = firestoreMod;
    var appName = "repairPresetApp-" + settings.syncId.replace(/[^a-zA-Z0-9_-]/g, "_");
    var existing = appMod.getApps().find(function(app){ return app.name === appName; });
    cloud.app = existing || appMod.initializeApp(config, appName);
    cloud.db = firestoreMod.getFirestore(cloud.app);
    cloud.ready = true;
    return settings;
  }

  function downloadJson(filename, data){
    var blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
    toast(filename + " を書き出しました");
  }
  function importPresets(file){
    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var parsed = JSON.parse(ev.target.result);
        if(!Array.isArray(parsed)) throw new Error("invalid");
        var current = loadPresets();
        var imported = 0;
        parsed.forEach(function(p){
          if(!p || !p.name || !p.data) return;
          var idx = current.findIndex(function(x){ return x.name === p.name; });
          var record = {
            id: p.id || ("p_" + Date.now() + "_" + Math.random().toString(16).slice(2)),
            name: p.name,
            savedAt: p.savedAt || new Date().toISOString(),
            data: p.data
          };
          if(idx >= 0) current[idx] = record;
          else current.push(record);
          imported++;
        });
        savePresets(current);
        renderPresets();
        toast(imported + "件のプリセットを読み込みました");
      }catch(e){
        toast("JSONの読み込みに失敗しました");
      }
    };
    reader.readAsText(file);
  }

      serial: "2501456",
      factory: "320：（電化）",
      faultCode: "2HF",
      repairSales: "修理売上",
      internalNote: "【2HF】該当症状あり　連絡希望時間帯：指定なし　お客様メールアドレス：sample@example.com",
      serviceNote: "液晶画面が表示しない場合は、関連部品の状態確認を実施。",
      productName: "全自洗",
      startDate: "2022/08",
      endDate: "2023/10",
      partsWarranty: "2029/10",
      symptomCode: "2HF",
      symptom: "液晶画面が表示しない",
      frequency: "常時",
      repairCategory: "通常修理",
      treatmentCategory: "部品交換",
      treatmentDetail: "部品交換",
      contactToClient: "作業完了。再発時は点検履歴を参照してください。",
      periodType: "期間内",
      claimCode: "9990",
      claimSubCode: "3280",
      claimName: "本社諸口（無償）",
      reportSend: "不要",
      freeReason: "修理保証",
      otherDetail: "その他明細なし",
      bill0Own: "0",
      bill1Own: "0",
      bill5Own: "1900",
      __parts: [
        {billing:"請求先1", adjust:"", number:"ABC-123", name:"表示基板", qty:"1"}
      ]
    });
    invoices[0].type = "無償";
    renderInvoiceStrip();
    updateBillTotals();
    setDirty(true);
    toast("サンプルを入力しました");
  }

  renderBill();
  renderParts();
  renderInvoiceStrip();
  updateBillTotals();
  applyFieldVisibility();
  $("doneAt").value = nowText();

  document.addEventListener("input", function(ev){
    var target = ev.target;
    if(target.matches("[data-label]")){
      setDirty(true);
      syncHeader();
      updateBillTotals();
      renderDisplayMode();
    }
    if(target.matches("[data-part]")){
      var idx = Number(target.getAttribute("data-index"));
      var key = target.getAttribute("data-part");
      if(partRows[idx]) partRows[idx][key] = target.value;
      setDirty(true);
      renderDisplayMode();
    }
  });
  document.addEventListener("change", function(ev){
    if(ev.target.matches("[data-invoice-type]")){
      var invoiceIndex = Number(ev.target.getAttribute("data-invoice-type"));
      if(invoices[invoiceIndex]){
        invoices[invoiceIndex].type = ev.target.value || "無償";
        if(invoiceIndex === currentInvoiceIndex){
          saveActiveInvoiceData();
          renderInvoiceStrip();
          setDirty(true);
        }else{
          switchInvoice(invoiceIndex);
        }
        renderDisplayMode();
      }
      return;
    }
    if(ev.target.matches("[data-invoice-reason]")){
      var reasonIndex = Number(ev.target.getAttribute("data-invoice-reason"));
      if(invoices[reasonIndex]){
        invoices[reasonIndex].reason = ev.target.value || "";
        if(reasonIndex === currentInvoiceIndex){
          saveActiveInvoiceData();
          renderInvoiceStrip();
          setDirty(true);
        }else{
          switchInvoice(reasonIndex);
        }
        renderDisplayMode();
      }
      return;
    }
    if(ev.target.id === "invoiceAddSelect"){
      if(ev.target.value) addInvoice(ev.target.value);
      return;
    }
    if(ev.target.matches("[data-label]")){
      setDirty(true);
      syncHeader();
      updateBillTotals();
      renderDisplayMode();
    }
  });
  document.addEventListener("click", function(ev){
    var deletePartIndex = ev.target.getAttribute("data-delete-part");
    if(deletePartIndex !== null){
      deletePart(Number(deletePartIndex));
      return;
    }
    var deleteInvoiceIndex = ev.target.getAttribute("data-delete-invoice");
    if(deleteInvoiceIndex){
      deleteInvoice(Number(deleteInvoiceIndex));
      return;
    }
    var loadId = ev.target.getAttribute("data-load-preset");
    if(loadId){
      var p = loadPresets().find(function(x){ return x.id === loadId; });
      if(p){
        confirmDialog(p.name + " を読み込みます。現在の入力は上書きされます。", function(){
          applyData(p.data);
          updateBillTotals();
          closeModal();
          toast(p.name + " を読み込みました");
          setMode(false, true);
        });
      }
      return;
    }
    var overwriteId = ev.target.getAttribute("data-overwrite-preset");
    if(overwriteId){
      var arr = loadPresets();
      var idx = arr.findIndex(function(x){ return x.id === overwriteId; });
      if(idx >= 0){
        confirmDialog(arr[idx].name + " に現在の入力を上書きしますか？", function(){
          arr[idx].data = collectData();
          arr[idx].savedAt = new Date().toISOString();
          savePresets(arr);
          renderPresets();
          toast("上書き保存しました");
          setDirty(false);
        });
      }
      return;
    }
    var deleteId = ev.target.getAttribute("data-delete-preset");
    if(deleteId){
      var current = loadPresets();
      var target = current.find(function(x){ return x.id === deleteId; });
      confirmDialog((target ? target.name : "プリセット") + " を削除しますか？", function(){
        savePresets(current.filter(function(x){ return x.id !== deleteId; }));
        renderPresets();
        toast("削除しました");
      });
    }
  });
  all(".tab").forEach(function(btn){
    btn.addEventListener("click", function(){
      currentTab = btn.getAttribute("data-tab");
      all(".tab").forEach(function(b){ b.classList.remove("active"); });
      all(".tab-panel").forEach(function(p){ p.classList.remove("active"); });
      btn.classList.add("active");
      $("panel-" + currentTab).classList.add("active");
      renderDisplayMode();
    });
  });
  $("btnOpenModal").addEventListener("click", openModal);
  $("btnCloseModal").addEventListener("click", closeModal);
  $("btnSettings").addEventListener("click", openSettings);
  $("btnCloseSettings").addEventListener("click", closeSettings);
  $("overlay").addEventListener("click", function(){
    if($("confirmBox").style.display === "block") return;
    closeSettings();
    closeModal();
  });
  $("btnSavePreset").addEventListener("click", function(){ savePreset(false); });
  $("presetSearch").addEventListener("input", renderPresets);
  $("btnClear").addEventListener("click", function(){
    confirmDialog("全ての入力内容をクリアしますか？", function(){ clearData(); toast("クリアしました"); });
  });
  $("btnDraft").addEventListener("click", saveDraft);
  $("btnLoadDraft").addEventListener("click", loadDraft);
  $("modeToggle").addEventListener("change", function(){ setMode($("modeToggle").checked, true); });
  $("darkModeToggle").addEventListener("change", function(){ setDarkMode($("darkModeToggle").checked, true); });
  var copyPartsButton = document.querySelector("[data-copy-parts]");
  if(copyPartsButton){
    copyPartsButton.addEventListener("click", function(){
      copyText(partsSummary() || "部品行がありません");
    });
  }
  $("btnAddPart").addEventListener("click", function(){
    partRows.push({billing:"請求先" + (currentInvoiceIndex + 1), adjust:"", number:"", name:"", qty:"1"});
    renderParts();
    setDirty(true);
  });
  window.addEventListener("beforeunload", function(){
    if(storageOK && dirty) localStorage.setItem(DRAFT_KEY, JSON.stringify(collectData()));
  });
  syncHeader();
  applyFieldVisibility();
  setDarkMode(storageOK && localStorage.getItem(DARK_MODE_KEY) === "1", false);
  if(storageOK){
    var savedDraft = localStorage.getItem(DRAFT_KEY);
    if(savedDraft){
      try{ applyData(JSON.parse(savedDraft)); updateBillTotals(); }catch(e){}
    }
    setMode(localStorage.getItem(MODE_KEY) !== "view", false);
  }else{
    setMode(true, false);
  }
})();
</script>
</body>
</html>
